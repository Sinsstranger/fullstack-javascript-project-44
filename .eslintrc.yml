env:
  node: true
  es2021: true
extends:
  - eslint:recommended
  - 'airbnb-base'
  - 'plugin:jest/recommended'
overrides: [ ]
parserOptions:
  ecmaVersion: latest
  sourceType: module
plugins:
  - jest
rules:
  indent:
    - error
    - tab
  linebreak-style:
    - error
    - unix
  quotes:
    - error
    - single
  semi:
    - error
    - always
  no-console: 0
  import/extensions: # FIXME: remove when rule will be adjusted for new nodejs version
    - error
    - ignorePackages
    - js: always
  no-underscore-dangle: [ 2, { "allow": [ "__filename", "__dirname" ] } ]